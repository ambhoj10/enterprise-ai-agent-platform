name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'agents/**'
      - 'api/**'
      - 'app/**'
      - 'models/**'
      - 'orchestrator/**'
      - 'security/**'
      - 'services/**'
      - 'requirements.txt'
      - 'Dockerfile'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t ambhoj10/enterprise-ai-platform:latest \
            . \
            --push

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps Extension
        run: |
          az extension add \
            --name containerapp \
            --upgrade \
            --allow-preview true

      - name: Update Backend Container App
        run: |
          az containerapp update \
            --name enterprise-ai-agent-platform \
            --resource-group rg-enterprise-ai-platform-dev \
            --image ambhoj10/enterprise-ai-platform:latest
